<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#5f6cff,#7f53ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    width:450px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom:10px;
}

.stats {
    display:flex;
    justify-content:space-around;
    margin:20px 0;
}

.box {
    padding:10px;
    border-radius:10px;
    width:90px;
    color:white;
    font-weight:bold;
}

.present { background:#4CAF50; }
.late { background:#2196F3; }
.absent { background:#F44336; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th, td {
    padding:10px;
    border:1px solid #ddd;
}

th {
    background:#5f6cff;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h2>📊 Dashboard</h2>

<h3>Today Summary</h3>

<div class="stats">
    <div class="box present">P<br><span id="p"></span></div>
    <div class="box late">L<br><span id="l"></span></div>
    <div class="box absent">A<br><span id="a"></span></div>
</div>

<h3>Monthly Attendance %</h3>

<table id="m"></table>

</div>

<script>

fetch("/dashboard-data")
.then(res => res.json())
.then(data => {

    // TODAY
    document.getElementById("p").innerText = data.today.present;
    document.getElementById("l").innerText = data.today.late;
    document.getElementById("a").innerText = data.today.absent;

    // MONTHLY TABLE
    let html = "<tr><th>Name</th><th>Attendance %</th></tr>";

    data.monthly.forEach(x=>{
        html += `<tr>
                    <td>${x.Name}</td>
                    <td>${x.Percentage}%</td>
                 </tr>`;
    });

    document.getElementById("m").innerHTML = html;
});

</script>

</body>
</html>
